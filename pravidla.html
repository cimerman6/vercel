<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameMaster vs. Presýpacie Hodiny - Pravidlá</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #ececec;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-align: center;
    }

    .content {
      max-width: 800px;
      text-align: center;
      margin-bottom: 40px;
    }

    .content p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    button {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      background: #ffffff;
      border: 3px solid #2b2b2b;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      transition: transform 0.1s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(2px);
    }
  </style>
</head>
<body>
  <h1>Pravidlá</h1>
  <div class="content">
    <p>Vitajte v hre GameMaster vs. Presýpacie Hodiny!</p>
    <p>Cieľom normálnej hry je dosiahnuť 500 bodov a 30 mincí.</p>
    <p>V nekonečnej hre zbierajte čo najviac bodov bez konca.</p>
    <p>Používajte šípku hore alebo medzerník na skok.</p>
    <p>Buďte opatrní, aby ste sa nedotkli prekážok!</p>
  </div>
  <button onclick="window.location.href='menu.html'">Návrat do menu</button>
</body>
</html>
